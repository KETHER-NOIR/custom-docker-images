name: Tailscale

on:
    push:
        branches:
            - main
        paths:
            - "images/tailscale/**"
            - ".github/workflows/tailscale.yaml"
            - "!images/tailscale/README.md"
    workflow_dispatch:

jobs:
    build-tailscale:
        runs-on: ubuntu-latest
        permissions:
            contents: read
            security-events: write
            id-token: write

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Get upstream version
              id: get_version
              run: |
                  VERSION=$(grep '^ARG TAILSCALE_VERSION=' images/tailscale/Dockerfile | cut -d'=' -f2)
                  echo "UPSTREAM_VERSION=$VERSION" >> $GITHUB_ENV

            - name: Extract Docker metadata
              id: meta
              uses: docker/metadata-action@v5
              with:
                  images: kethernoir/tailscale-custom
                  flavor: |
                      latest=auto
                      suffix=-envconsul,onlatest=true
                  tags: |
                      type=semver,pattern={{version}},value=${{ env.UPSTREAM_VERSION }}
                      type=semver,pattern={{major}}.{{minor}},value=${{ env.UPSTREAM_VERSION }}
                      type=semver,pattern={{major}},value=${{ env.UPSTREAM_VERSION }}

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Install Cosign
              uses: sigstore/cosign-installer@v3

            - name: Login to Docker Hub
              uses: docker/login-action@v3
              with:
                  username: ${{ secrets.DOCKERHUB_USERNAME }}
                  password: ${{ secrets.DOCKERHUB_TOKEN }}

            - name: Build Docker image for scanning
              uses: docker/build-push-action@v5
              with:
                  context: images/tailscale
                  file: images/tailscale/Dockerfile
                  builder: ${{ steps.buildx.outputs.name }}
                  push: false
                  load: true
                  tags: ${{ steps.meta.outputs.tags }}
                  labels: ${{ steps.meta.outputs.labels }}

            - name: Scan image with Trivy
              uses: aquasecurity/trivy-action@master
              with:
                  image-ref: kethernoir/tailscale-custom:${{ env.UPSTREAM_VERSION }}-envconsul
                  format: sarif
                  output: trivy-envconsul.sarif
                  severity: CRITICAL,HIGH
                  exit-code: "0"

            - name: Upload Trivy scan results
              if: always()
              uses: github/codeql-action/upload-sarif@v3
              with:
                  sarif_file: trivy-envconsul.sarif
                  category: trivy-envconsul

            - name: Push Docker image
              id: push
              uses: docker/build-push-action@v5
              with:
                  context: images/tailscale
                  file: images/tailscale/Dockerfile
                  builder: ${{ steps.buildx.outputs.name }}
                  push: true
                  tags: ${{ steps.meta.outputs.tags }}
                  labels: ${{ steps.meta.outputs.labels }}

            - name: Sign image with Cosign
              env:
                  COSIGN_EXPERIMENTAL: "true"
              run: |
                  echo "${{ steps.meta.outputs.tags }}" | while read tag; do
                    cosign sign --yes "${tag}@${{ steps.push.outputs.digest }}"
                  done
