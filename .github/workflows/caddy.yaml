name: Build Custom Caddy Images

on:
    push:
        branches:
            - main
        paths:
            - "images/caddy/**"
            - ".github/workflows/caddy.yaml"
            - "!images/caddy/README.md"
    workflow_dispatch:

jobs:
    build-variants:
        runs-on: ubuntu-latest
        permissions:
            contents: read
            security-events: write
            id-token: write

        strategy:
            matrix:
                include:
                    - variant: cf
                      install_envconsul: false

                    - variant: cf-envconsul
                      install_envconsul: true

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Get upstream version
              id: get_version
              run: |
                  VERSION=$(grep '^ARG CADDY_VERSION=' images/caddy/Dockerfile | cut -d'=' -f2)
                  echo "UPSTREAM_VERSION=$VERSION" >> $GITHUB_ENV

            - name: Extract Docker metadata
              id: meta
              uses: docker/metadata-action@v5
              with:
                  images: kethernoir/caddy-custom
                  flavor: |
                      latest=auto
                      suffix=-${{ matrix.variant }},onlatest=true
                  tags: |
                      type=semver,pattern={{version}},value=${{ env.UPSTREAM_VERSION }}
                      type=semver,pattern={{major}}.{{minor}},value=${{ env.UPSTREAM_VERSION }}
                      type=semver,pattern={{major}},value=${{ env.UPSTREAM_VERSION }}

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Install Cosign
              uses: sigstore/cosign-installer@v3

            - name: Login to Docker Hub
              uses: docker/login-action@v3
              with:
                  username: ${{ secrets.DOCKERHUB_USERNAME }}
                  password: ${{ secrets.DOCKERHUB_TOKEN }}

            - name: Build Docker image (local, for scanning)
              uses: docker/build-push-action@v5
              with:
                  context: images/caddy
                  file: images/caddy/Dockerfile
                  push: false
                  load: true
                  tags: ${{ steps.meta.outputs.tags }}
                  labels: ${{ steps.meta.outputs.labels }}
                  build-args: |
                      INSTALL_ENVCONSUL=${{ matrix.install_envconsul }}

            - name: Scan image with Trivy
              uses: aquasecurity/trivy-action@master
              with:
                  image-ref: kethernoir/caddy-custom:${{ env.UPSTREAM_VERSION }}-${{ matrix.variant }}
                  format: sarif
                  output: trivy-${{ matrix.variant }}.sarif
                  severity: CRITICAL,HIGH
                  exit-code: "1"

            - name: Upload Trivy scan results
              if: always()
              uses: github/codeql-action/upload-sarif@v3
              with:
                  sarif_file: trivy-${{ matrix.variant }}.sarif
                  category: trivy-${{ matrix.variant }}

            - name: Push Docker image
              id: push
              uses: docker/build-push-action@v5
              with:
                  context: images/caddy
                  file: images/caddy/Dockerfile
                  push: true
                  tags: ${{ steps.meta.outputs.tags }}
                  labels: ${{ steps.meta.outputs.labels }}
                  build-args: |
                      INSTALL_ENVCONSUL=${{ matrix.install_envconsul }}

            - name: Sign image with Cosign
              env:
                  COSIGN_EXPERIMENTAL: "true"
              run: |
                  echo "${{ steps.meta.outputs.tags }}" | while read tag; do
                    cosign sign --yes "${tag}@${{ steps.push.outputs.digest }}"
                  done
