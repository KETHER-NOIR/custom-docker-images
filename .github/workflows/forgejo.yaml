name: Build Custom Forgejo Images

on:
    push:
        branches:
            - main
        paths:
            - "images/forgejo/**"
            - ".github/workflows/forgejo.yaml"
            - "!images/forgejo/README.md"
    workflow_dispatch:

jobs:
    build-variants:
        runs-on: ubuntu-latest
        strategy:
            matrix:
                include:
                    - variant: rst
                      install_rst: true
                      install_envconsul: false

                    - variant: envconsul
                      install_rst: false
                      install_envconsul: true

                    - variant: rst-envconsul
                      install_rst: true
                      install_envconsul: true
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Get upstream version
              id: get_version
              run: |
                  VERSION=$(grep '^FROM ' images/forgejo/Dockerfile | awk -F':' '{print $2}')
                  echo "UPSTREAM_VERSION=$VERSION" >> $GITHUB_ENV

            - name: Extract Docker metadata
              id: meta
              uses: docker/metadata-action@v5
              with:
                  images: kethernoir/forgejo-custom
                  flavor: |
                      latest=auto
                      suffix=-${{ matrix.variant }},onlatest=true
                  tags: |
                      type=semver,pattern={{version}},value=${{ env.UPSTREAM_VERSION }}
                      type=semver,pattern={{major}}.{{minor}},value=${{ env.UPSTREAM_VERSION }}
                      type=semver,pattern={{major}},value=${{ env.UPSTREAM_VERSION }}
                      
            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            # Login to your registry (e.g., Docker Hub or GitHub Container Registry)
            - name: Login to Docker Hub
              uses: docker/login-action@v3
              with:
                  username: ${{ secrets.DOCKERHUB_USERNAME }}
                  password: ${{ secrets.DOCKERHUB_TOKEN }}

            - name: Build and push Docker image
              uses: docker/build-push-action@v5
              with:
                  context: images/forgejo
                  # We use the same Dockerfile for all 3 jobs
                  file: ./Dockerfile
                  push: true
                  tags: ${{ steps.meta.outputs.tags }}
                  labels: ${{ steps.meta.outputs.labels }}
                  # This is where the magic happens: passing matrix vars to the Dockerfile ARGs
                  build-args: |
                      INSTALL_RST=${{ matrix.install_rst }}
                      INSTALL_VAULT=${{ matrix.install_vault }}
